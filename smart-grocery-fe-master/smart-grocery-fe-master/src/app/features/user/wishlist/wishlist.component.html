<div class="flex justify-between items-center mb-6">
  <h1 class="text-3xl font-bold text-gray-900">My Wishlist</h1>
  <span class="px-3 py-1 bg-primary-100 text-primary-800 rounded-full text-sm font-semibold shadow-sm">{{ favorites.length }} items</span>
</div>

<div *ngIf="!loading && favorites.length === 0" class="text-center py-20 bg-white rounded-2xl shadow-sm border border-gray-100">
  <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
  </svg>
  <h3 class="mt-2 text-sm font-medium text-gray-900">Your wishlist is empty</h3>
  <p class="mt-1 text-sm text-gray-500">Explore products and add them to your wishlist.</p>
</div>

<div *ngIf="loading" class="flex justify-center items-center py-20">
  <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" *ngIf="!loading && favorites.length > 0">
  <div *ngFor="let f of favorites" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 group relative flex flex-col">
    <div class="relative h-48 bg-gray-50 overflow-hidden p-4 flex justify-center items-center">
      <img [src]="f.productImageUrl || 'assets/placeholder.png'" class="h-full object-contain mix-blend-multiply transition-transform duration-500 group-hover:scale-110" alt="Product Image">
      <div class="absolute bottom-2 left-2 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-white/80 backdrop-blur-md text-gray-800 shadow-sm border border-gray-100">
        {{ f.categoryName }}
      </div>
    </div>
    <div class="p-5 flex-1 flex flex-col">
      <div class="flex justify-between items-start mb-2">
        <div>
          <h3 class="text-lg font-bold text-gray-900 group-hover:text-primary-600 transition-colors">{{ f.productName }}</h3>
          <p class="text-sm text-gray-500">{{ f.productBrand || 'No brand' }}</p>
        </div>
        <p class="text-lg font-extrabold text-gray-900">${{ f.productPrice }}</p>
      </div>
      <div *ngIf="f.tags && f.tags.length > 0" class="flex flex-wrap gap-1 mb-3">
        <span *ngFor="let tag of f.tags" class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full text-xs font-medium">{{ tag }}</span>
      </div>
      <div class="flex-1"></div>
      <button (click)="removeFavorite(f.productId)" class="w-full py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 hover:text-red-700 transition-colors font-semibold text-sm flex justify-center items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
        Remove
      </button>
    </div>
  </div>
</div>
