<div class="px-4 py-6 sm:px-6 lg:px-8">
  <div class="md:flex md:items-center md:justify-between mb-8">
    <div class="min-w-0 flex-1">
      <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:truncate sm:text-3xl sm:tracking-tight">
        Add New Category
      </h2>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden max-w-2xl">
    <div class="p-6">
      <form class="space-y-6" [formGroup]="categoryForm" (ngSubmit)="onSubmit()">
        <!-- Error Alert -->
        <div *ngIf="error" class="p-4 rounded-md bg-red-50 text-red-700 text-sm border border-red-200">
          {{ error }}
        </div>
        
        <!-- Success Alert -->
        <div *ngIf="success" class="p-4 rounded-md bg-green-50 text-green-700 text-sm border border-green-200">
          {{ success }}
        </div>

        <div>
          <label for="name" class="block text-sm font-medium leading-6 text-gray-900">Category Name</label>
          <div class="mt-2">
            <input type="text" id="name" formControlName="name" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary-600 sm:text-sm sm:leading-6 px-3">
          </div>
          <p *ngIf="categoryForm.get('name')?.touched && categoryForm.get('name')?.invalid" class="mt-2 text-sm text-red-600">
            Name is required.
          </p>
        </div>

        <div>
          <label for="description" class="block text-sm font-medium leading-6 text-gray-900">Description</label>
          <div class="mt-2">
            <textarea id="description" formControlName="description" rows="4" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary-600 sm:text-sm sm:leading-6 px-3"></textarea>
          </div>
        </div>

        <div class="flex items-center justify-end gap-x-6 pt-4 border-t border-gray-100">
          <button type="button" class="text-sm font-semibold leading-6 text-gray-900" (click)="categoryForm.reset()">Clear</button>
          <button type="submit" [disabled]="loading || categoryForm.invalid" class="rounded-md bg-primary-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-600 disabled:opacity-50 disabled:cursor-not-allowed">
            <span *ngIf="!loading">Save Category</span>
            <span *ngIf="loading" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Saving...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
