<div class="app-shell">

  <!-- ── Navbar ── -->
  <header class="navbar">
    <div class="nav-inner">
      <a routerLink="/products" class="nav-brand">
        <span class="brand-icon">🛒</span>
        <span class="brand-text">Smart Grocery</span>
      </a>

      <nav class="nav-links">
        <a routerLink="/products" routerLinkActive="active" class="nav-link">
          🏪 Shop
        </a>
        <a routerLink="/wishlist" routerLinkActive="active" class="nav-link">
          🤍 Wishlist
        </a>
      </nav>

      <div class="nav-right">
        <div class="user-chip">
          <span class="user-dot">{{ username[0]?.toUpperCase() }}</span>
          <span class="user-name">{{ username }}</span>
        </div>
        <button class="logout-btn" (click)="logout()">Sign out</button>
      </div>

      <!-- Mobile menu toggle -->
      <button class="mobile-toggle" (click)="menuOpen = !menuOpen">☰</button>
    </div>

    <!-- Mobile menu -->
    <div class="mobile-menu" *ngIf="menuOpen" (click)="menuOpen = false">
      <a routerLink="/products" class="mobile-link">🏪 Shop</a>
      <a routerLink="/wishlist" class="mobile-link">🤍 Wishlist</a>
      <button class="mobile-logout" (click)="logout()">🚪 Sign out</button>
    </div>
  </header>

  <!-- ── Page content ── -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
