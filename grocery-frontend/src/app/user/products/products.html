<!-- Toast -->
<div class="toast" *ngIf="toast" [class.toast-err]="toastErr">{{ toast }}</div>

<!-- Hero search bar -->
<div class="hero">
  <h1 class="hero-title">Fresh finds, every day 🛒</h1>
  <p class="hero-sub">{{ totalElements }} products available</p>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input
      type="text"
      class="search-input"
      placeholder="Search products, brands…"
      [(ngModel)]="search"
      (ngModelChange)="onSearchChange()"
    />
    <button class="search-clear" *ngIf="search" (click)="search=''; onFilterChange()">✕</button>
  </div>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <div class="filter-chips">
    <button class="chip" [class.chip-active]="selectedCategory === ''"
            (click)="selectedCategory=''; onFilterChange()">All</button>
    <button class="chip" *ngFor="let c of categories"
            [class.chip-active]="selectedCategory === c.id"
            (click)="selectedCategory=c.id; onFilterChange()">{{ c.name }}</button>
  </div>

  <select class="sort-select" [(ngModel)]="sortDir" (change)="onSortChange()">
    <option value="desc">Newest first</option>
    <option value="asc">Oldest first</option>
  </select>
</div>

<!-- Loading skeleton -->
<div class="grid" *ngIf="loading">
  <div class="skeleton-card" *ngFor="let i of [1,2,3,4,5,6,7,8]">
    <div class="skel-img"></div>
    <div class="skel-body">
      <div class="skel-line w60"></div>
      <div class="skel-line w40"></div>
      <div class="skel-line w80"></div>
    </div>
  </div>
</div>

<!-- Product grid -->
<div class="grid" *ngIf="!loading">
  <a
    *ngFor="let p of products; trackBy: trackById"
    [routerLink]="['/products', p.id]"
    class="product-card"
  >
    <!-- Wishlist button -->
    <button
      class="wish-btn"
      [class.wished]="wishlistMap[p.id]"
      [class.spinning]="togglingMap[p.id]"
      (click)="toggleWishlist(p, $event)"
      [title]="wishlistMap[p.id] ? 'Remove from wishlist' : 'Add to wishlist'"
    >
      {{ wishlistMap[p.id] ? '❤️' : '🤍' }}
    </button>

    <!-- Image -->
    <div class="card-img-wrap">
      <img *ngIf="p.imageUrl" [src]="p.imageUrl" [alt]="p.name" class="card-img" />
      <div *ngIf="!p.imageUrl" class="card-img-placeholder">🥑</div>
    </div>

    <!-- Body -->
    <div class="card-body">
      <span class="card-category">{{ p.categoryName }}</span>
      <h3 class="card-name">{{ p.name }}</h3>
      <p class="card-brand" *ngIf="p.brand">{{ p.brand }}</p>

      <!-- Tags -->
      <div class="card-tags" *ngIf="p.tags?.length">
        <span class="tag" *ngFor="let t of p.tags?.slice(0,3)">{{ t }}</span>
      </div>

      <div class="card-footer">
        <span class="card-price">EGP {{ p.price | number:'1.2-2' }}</span>
        <span class="card-arrow">→</span>
      </div>
    </div>
  </a>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="products.length === 0">
    <div class="empty-icon">🔍</div>
    <p class="empty-title">No products found</p>
    <p class="empty-sub">Try a different search or category</p>
    <button class="btn-reset" (click)="search=''; selectedCategory=''; onFilterChange()">Clear filters</button>
  </div>
</div>

<!-- Pagination -->
<div class="pagination" *ngIf="totalPages > 1 && !loading">
  <button class="page-btn" (click)="prevPage()" [disabled]="page === 0">‹ Prev</button>
  <div class="page-dots">
    <span *ngFor="let i of [].constructor(totalPages); let idx = index"
          class="dot" [class.dot-active]="idx === page"
          (click)="page=idx; loadProducts()"></span>
  </div>
  <button class="page-btn" (click)="nextPage()" [disabled]="page >= totalPages - 1">Next ›</button>
</div>
