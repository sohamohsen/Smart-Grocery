<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-gradient-to-br from-primary-50 to-white">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
      Create an account
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Join <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-600 to-accent font-semibold">Smart Grocery</span> today
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white/80 backdrop-blur-lg py-8 px-4 shadow-xl sm:rounded-2xl sm:px-10 border border-white">
      <form class="space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div *ngIf="error" class="p-3 rounded-md bg-red-50 text-red-500 text-sm">
          {{ error }}
        </div>
        
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700"> Full Name </label>
          <div class="mt-1">
            <input id="name" formControlName="name" type="text" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
          </div>
        </div>

        <div>
          <label for="username" class="block text-sm font-medium text-gray-700"> Username </label>
          <div class="mt-1">
            <input id="username" formControlName="username" type="text" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700"> Email address </label>
          <div class="mt-1">
            <input id="email" formControlName="email" type="email" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
          </div>
        </div>

        <div>
           <label for="password" class="block text-sm font-medium text-gray-700"> Password </label>
           <div class="mt-1">
             <input id="password" formControlName="password" type="password" required class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
           </div>
           <p *ngIf="registerForm.get('password')?.errors?.['minlength'] && registerForm.get('password')?.touched" class="text-xs text-red-500 mt-1">
             Password must be at least 6 characters long
           </p>
        </div>

        <div>
          <button type="submit" [disabled]="loading || registerForm.invalid" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-md text-sm font-medium text-white bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-700 hover:to-primary-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 disabled:opacity-50 transition-all hover:shadow-lg active:translate-y-0.5">
            <div *ngIf="loading" class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
            <span *ngIf="!loading">Sign up</span>
          </button>
        </div>
      </form>
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
          Already have an account? 
          <a routerLink="/login" class="font-medium text-primary-600 hover:text-primary-500 transition-colors">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
