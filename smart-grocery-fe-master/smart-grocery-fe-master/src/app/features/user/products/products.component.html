<div class="flex justify-between items-center mb-6">
  <h1 class="text-3xl font-bold text-gray-900">Discover Products</h1>
  <div class="relative w-64 md:w-80">
    <input type="text" [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" placeholder="Search products..." class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-full text-sm focus:ring-primary-500 focus:border-primary-500 shadow-sm transition-all focus:shadow-md font-sans">
    <svg class="h-5 w-5 text-gray-400 absolute left-3.5 top-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
  </div>
</div>

<div *ngIf="productsPage && productsPage.content.length === 0" class="text-center py-20 bg-white rounded-2xl shadow-sm border border-gray-100">
  <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
  </svg>
  <h3 class="mt-2 text-sm font-medium text-gray-900">No products found</h3>
  <p class="mt-1 text-sm text-gray-500">Try adjusting your search query.</p>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
  <div *ngFor="let p of productsPage?.content" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 group relative">
    <div class="relative h-48 bg-gray-50 overflow-hidden p-4 flex justify-center items-center">
      <img [src]="p.imageUrl || 'assets/placeholder.png'" class="h-full object-contain mix-blend-multiply transition-transform duration-500 group-hover:scale-110" alt="Product Image">
      <button (click)="toggleFavorite(p.id)" class="absolute top-3 right-3 p-2 bg-white rounded-full shadow-md text-gray-400 hover:text-red-500 focus:outline-none transition-colors group/btn">
        <svg xmlns="http://www.w3.org/2000/svg" [class.text-red-500]="isFavorite(p.id)" [class.fill-current]="isFavorite(p.id)" class="h-5 w-5 transform transition-transform group-hover/btn:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
      </button>
      <div class="absolute bottom-2 left-2 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-white/80 backdrop-blur-md text-gray-800 shadow-sm border border-gray-100">
        {{ p.category }}
      </div>
    </div>
    <div class="p-5">
      <div class="flex justify-between items-start">
        <div>
          <h3 class="text-lg font-bold text-gray-900 group-hover:text-primary-600 transition-colors">{{ p.name }}</h3>
          <p class="text-sm text-gray-500">{{ p.brand || 'No brand' }}</p>
        </div>
        <p class="text-lg font-extrabold text-gray-900">${{ p.price }}</p>
      </div>
      <p class="mt-2 text-sm text-gray-600 line-clamp-2 min-h-[2.5rem]">{{ p.description || 'No description available for this product.' }}</p>
    </div>
  </div>
</div>

<div class="mt-8 flex justify-center pb-12" *ngIf="productsPage && productsPage.totalPages > 1">
  <div class="flex gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100">
    <button [disabled]="productsPage.pageNumber === 0" (click)="changePage(-1)" class="px-4 py-2 text-sm font-medium rounded-full hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors text-gray-700">Previous</button>
    <div class="px-4 py-2 text-sm font-medium text-gray-900 border-x border-gray-100">Page {{ productsPage.pageNumber + 1 }} of {{ productsPage.totalPages }}</div>
    <button [disabled]="productsPage.last" (click)="changePage(1)" class="px-4 py-2 text-sm font-medium rounded-full hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors text-gray-700">Next</button>
  </div>
</div>
